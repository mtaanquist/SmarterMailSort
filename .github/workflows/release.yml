name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create (e.g. v0.1.0). Must match the version in package.json / manifest.json."
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Determine release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm install

      - name: Verify (typecheck, lint, test)
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Build extension
        run: npm run build

      - name: Package XPI
        run: npm run package

      - name: Create .xpi artifact
        run: |
          for f in web-ext-artifacts/*.zip; do
            cp "$f" "${f%.zip}.xpi"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            web-ext-artifacts/*.zip
            web-ext-artifacts/*.xpi
          generate_release_notes: true
          fail_on_unmatched_files: true
