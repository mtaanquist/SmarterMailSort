<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SmarterMailSort</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <main class="container">
      <h1>SmarterMailSort</h1>

      <section class="panel">
        <label>
          Source folder
          <select id="folder"></select>
        </label>

        <label>
          Instruction
          <textarea
            id="instruction"
            rows="3"
            placeholder="e.g. move newsletters and notifications to the to_be_deleted folder"
          ></textarea>
        </label>

        <div class="actions preset-row">
          <select id="preset-select" aria-label="Saved presets">
            <option value="">Presets…</option>
          </select>
          <input id="preset-name" type="text" placeholder="Preset name" aria-label="Preset name" />
          <button id="save-preset" type="button">Save preset</button>
          <button id="delete-preset" type="button" disabled>Delete</button>
          <button id="restore-presets" type="button" title="Add back any missing built-in presets (your own are kept)">Restore defaults</button>
        </div>

        <div class="actions">
          <button id="start" type="button">Classify</button>
          <button id="abort" type="button" disabled>Stop &amp; review</button>
          <label class="inline">
            <input type="checkbox" id="cross-account" />
            Allow moves to other accounts
          </label>
          <a id="settings-link" href="#">Settings</a>
        </div>
      </section>

      <section class="panel" id="resume-panel" hidden>
        <p id="resume-text" class="status"></p>
        <div class="actions">
          <button id="resume" type="button">Resume</button>
          <button id="resume-discard" type="button">Discard</button>
        </div>
      </section>

      <section class="panel" id="undo-panel" hidden>
        <p id="undo-text" class="status"></p>
        <button id="undo" type="button">Undo last apply</button>
      </section>

      <section class="panel" id="progress-panel" hidden>
        <h2>Progress</h2>
        <progress id="progress" max="100" value="0"></progress>
        <p id="progress-text" class="status"></p>
        <p id="progress-note" class="status" hidden></p>
      </section>

      <section class="panel" id="review-panel" hidden>
        <h2>Proposed changes</h2>
        <p id="review-summary" class="status"></p>
        <div class="review-controls" id="review-controls" hidden>
          <label class="inline">
            <input type="checkbox" id="select-all" checked />
            <span id="selected-count">0 of 0 selected</span>
          </label>
          <label class="inline">
            Min confidence
            <input
              type="range"
              id="confidence-threshold"
              min="0"
              max="1"
              step="0.05"
              value="0"
            />
            <span id="confidence-value">0.00</span>
          </label>
          <div class="inline keyword-filter">
            <input
              type="text"
              id="keyword-filter"
              placeholder="keyword, another…"
              aria-label="Filter by keyword (subject or sender)"
              title="Comma-separated. Matches subject or sender, case-insensitive."
            />
            <button id="deselect-matching" type="button">Deselect matching</button>
            <button id="select-matching" type="button">Select matching</button>
            <span id="filter-count" class="hint" aria-live="polite"></span>
          </div>
        </div>
        <div class="actions">
          <button id="apply" type="button">Apply selected moves</button>
          <button id="download" type="button">Download report</button>
          <label class="inline">
            <input type="checkbox" id="dry-run" />
            Dry-run (don't move anything)
          </label>
        </div>
        <div id="review"></div>
      </section>

      <p id="error" class="status err" role="alert" hidden></p>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
